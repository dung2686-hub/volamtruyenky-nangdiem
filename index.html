<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VLTK Planner — 4 ACC Build Guide</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-primary: #0a0a0f;
  --bg-secondary: #12121a;
  --bg-card: rgba(18, 18, 26, 0.85);
  --bg-card-hover: rgba(25, 25, 38, 0.95);
  --bg-glass: rgba(255, 255, 255, 0.03);
  --border-subtle: rgba(255, 255, 255, 0.06);
  --border-glow: rgba(212, 175, 55, 0.3);
  --gold: #d4af37;
  --gold-light: #f0d060;
  --gold-dim: rgba(212, 175, 55, 0.15);
  --crimson: #dc3545;
  --crimson-dim: rgba(220, 53, 69, 0.15);
  --text-primary: #e8e6e3;
  --text-secondary: #8a8a9a;
  --text-muted: #5a5a6a;
  --green: #2ecc71;
  --blue: #3498db;
  --orange: #e67e22;
  --purple: #9b59b6;
  --font-display: 'Cinzel', serif;
  --font-body: 'Inter', sans-serif;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --shadow-card: 0 4px 24px rgba(0, 0, 0, 0.4);
  --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--font-body);
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
  background-image:
    radial-gradient(ellipse at 20% 50%, rgba(212, 175, 55, 0.03) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 20%, rgba(220, 53, 69, 0.02) 0%, transparent 50%);
}
#main-nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 32px; height: 64px;
  background: rgba(10, 10, 15, 0.92); backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border-subtle);
}
.nav-brand { display: flex; align-items: center; gap: 10px; }
.nav-icon { font-size: 24px; }
.nav-title {
  font-family: var(--font-display); font-size: 20px; font-weight: 700;
  background: linear-gradient(135deg, var(--gold), var(--gold-light));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  letter-spacing: 1px;
}
.nav-links { display: flex; gap: 4px; }
.nav-link {
  display: flex; align-items: center; gap: 8px; padding: 8px 20px;
  border-radius: var(--radius-md); text-decoration: none;
  color: var(--text-secondary); font-size: 14px; font-weight: 500;
  transition: var(--transition); border: 1px solid transparent; cursor: pointer;
}
.nav-link:hover { color: var(--text-primary); background: var(--bg-glass); }
.nav-link.active { color: var(--gold); background: var(--gold-dim); border-color: var(--border-glow); }
#page-content { padding: 88px 32px 48px; max-width: 1200px; margin: 0 auto; min-height: 100vh; }
.page-header { text-align: center; margin-bottom: 48px; }
.page-title {
  font-family: var(--font-display); font-size: 32px; font-weight: 700;
  background: linear-gradient(135deg, var(--gold), var(--gold-light));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  margin-bottom: 8px;
}
.page-subtitle { color: var(--text-secondary); font-size: 15px; font-weight: 300; }
.team-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 20px; }
.char-card {
  position: relative; background: var(--bg-card); border: 1px solid var(--border-subtle);
  border-radius: var(--radius-lg); padding: 28px 24px; cursor: pointer;
  transition: var(--transition); overflow: hidden;
}
.char-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: var(--card-color); opacity: 0.6; transition: var(--transition);
}
.char-card:hover {
  background: var(--bg-card-hover); border-color: var(--card-color);
  transform: translateY(-4px); box-shadow: var(--shadow-card), 0 0 30px var(--card-glow);
}
.char-card:hover::before { height: 4px; opacity: 1; }
.char-card-header { display: flex; align-items: center; gap: 16px; margin-bottom: 16px; }
.char-emoji {
  font-size: 40px; width: 56px; height: 56px; display: flex; align-items: center; justify-content: center;
  background: var(--bg-glass); border-radius: var(--radius-md); border: 1px solid var(--border-subtle);
}
.char-info h3 { font-family: var(--font-display); font-size: 18px; font-weight: 700; margin-bottom: 2px; }
.char-branch { font-size: 13px; color: var(--text-secondary); }
.char-role {
  display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px;
  font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 12px;
}
.char-desc { font-size: 13px; color: var(--text-secondary); line-height: 1.6; }
.char-card-footer {
  margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border-subtle);
  display: flex; justify-content: space-between; align-items: center;
}
.char-element { font-size: 12px; color: var(--text-muted); }
.char-view-btn { font-size: 12px; color: var(--gold); font-weight: 500; display: flex; align-items: center; gap: 4px; transition: var(--transition); }
.char-card:hover .char-view-btn { gap: 8px; }
.detail-back {
  display: inline-flex; align-items: center; gap: 8px; padding: 8px 16px;
  border-radius: var(--radius-sm); color: var(--text-secondary); font-size: 14px;
  transition: var(--transition); margin-bottom: 24px; cursor: pointer;
  background: none; border: 1px solid var(--border-subtle); font-family: var(--font-body);
}
.detail-back:hover { color: var(--gold); border-color: var(--border-glow); }
.detail-header {
  display: flex; align-items: center; gap: 20px; margin-bottom: 32px; padding: 24px;
  background: var(--bg-card); border-radius: var(--radius-lg); border: 1px solid var(--border-subtle);
}
.detail-emoji {
  font-size: 48px; width: 72px; height: 72px; display: flex; align-items: center; justify-content: center;
  background: var(--bg-glass); border-radius: var(--radius-md);
}
.detail-name { font-family: var(--font-display); font-size: 28px; font-weight: 700; }
.detail-meta { font-size: 14px; color: var(--text-secondary); margin-top: 4px; }
.detail-summary {
  font-size: 14px; color: var(--text-secondary); margin-top: 8px; padding: 8px 14px;
  background: var(--gold-dim); border-radius: var(--radius-sm); border-left: 3px solid var(--gold);
}
.tabs {
  display: flex; gap: 4px; margin-bottom: 24px; background: var(--bg-secondary);
  padding: 4px; border-radius: var(--radius-md); border: 1px solid var(--border-subtle);
}
.tab-btn {
  flex: 1; padding: 10px 16px; border: none; background: none; color: var(--text-secondary);
  font-family: var(--font-body); font-size: 13px; font-weight: 500; cursor: pointer;
  border-radius: var(--radius-sm); transition: var(--transition);
}
.tab-btn:hover { color: var(--text-primary); background: var(--bg-glass); }
.tab-btn.active { color: var(--gold); background: var(--gold-dim); }
.tab-content { display: none; animation: fadeIn 0.3s ease; }
.tab-content.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.stats-table {
  width: 100%; border-collapse: separate; border-spacing: 0; background: var(--bg-card);
  border-radius: var(--radius-md); overflow: hidden; border: 1px solid var(--border-subtle); margin-bottom: 24px;
}
.stats-table th {
  background: rgba(212, 175, 55, 0.08); padding: 12px 16px; text-align: left;
  font-size: 12px; font-weight: 600; color: var(--gold); text-transform: uppercase;
  letter-spacing: 0.5px; border-bottom: 1px solid var(--border-subtle);
}
.stats-table td { padding: 12px 16px; font-size: 13px; border-bottom: 1px solid var(--border-subtle); }
.stats-table tr:last-child td { border-bottom: none; }
.stats-table tr:hover td { background: var(--bg-glass); }
.stats-table .note-cell { color: var(--text-secondary); font-size: 12px; font-style: italic; }
.stats-table .highlight { color: var(--gold); font-weight: 600; }
.calculator {
  background: var(--bg-card); border: 1px solid var(--border-subtle);
  border-radius: var(--radius-lg); padding: 24px; margin-bottom: 24px;
}
.calc-title { font-family: var(--font-display); font-size: 16px; color: var(--gold); margin-bottom: 16px; }
.calc-level-input { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; }
.calc-level-input label { font-size: 14px; font-weight: 500; color: var(--text-secondary); white-space: nowrap; }
.calc-slider {
  flex: 1; -webkit-appearance: none; appearance: none; height: 6px;
  background: var(--bg-secondary); border-radius: 3px; outline: none;
}
.calc-slider::-webkit-slider-thumb {
  -webkit-appearance: none; width: 20px; height: 20px; border-radius: 50%;
  background: var(--gold); cursor: pointer; box-shadow: 0 0 10px rgba(212, 175, 55, 0.4);
}
.calc-slider::-webkit-slider-thumb:hover { box-shadow: 0 0 20px rgba(212, 175, 55, 0.6); }
.calc-level-number {
  width: 70px; padding: 6px 10px; border: 1px solid var(--border-subtle);
  border-radius: var(--radius-sm); background: var(--bg-secondary); color: var(--gold);
  font-family: var(--font-display); font-size: 24px; font-weight: 700; text-align: center;
  outline: none; transition: var(--transition); -moz-appearance: textfield;
}
.calc-level-number::-webkit-outer-spin-button,
.calc-level-number::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
.calc-level-number:focus { border-color: var(--gold); box-shadow: 0 0 10px rgba(212, 175, 55, 0.2); }
.calc-bars { display: grid; gap: 12px; }
.calc-bar-row { display: grid; grid-template-columns: 100px 1fr 60px; align-items: center; gap: 12px; }
.calc-bar-label { font-size: 13px; font-weight: 500; color: var(--text-secondary); }
.calc-bar-track { height: 24px; background: var(--bg-secondary); border-radius: 12px; overflow: hidden; }
.calc-bar-fill {
  height: 100%; border-radius: 12px; transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1); position: relative;
}
.calc-bar-fill::after {
  content: ''; position: absolute; top: 0; right: 0; bottom: 0; width: 30%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15)); border-radius: 0 12px 12px 0;
}
.calc-bar-value { font-size: 14px; font-weight: 600; text-align: right; font-variant-numeric: tabular-nums; }
.calc-note {
  margin-top: 16px; padding: 12px 16px; border-radius: var(--radius-sm);
  font-size: 13px; line-height: 1.6; border-left: 3px solid var(--gold);
  background: var(--gold-dim); color: var(--text-secondary);
}
.skill-list { display: grid; gap: 12px; }
.skill-item {
  display: flex; gap: 16px; padding: 16px; background: var(--bg-card);
  border: 1px solid var(--border-subtle); border-radius: var(--radius-md); transition: var(--transition);
}
.skill-item:hover { border-color: var(--border-glow); background: var(--bg-card-hover); }
.skill-priority {
  width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
  border-radius: 50%; font-size: 14px; font-weight: 700; flex-shrink: 0;
}
.skill-priority.p1 { background: rgba(212, 175, 55, 0.2); color: var(--gold); }
.skill-priority.p2 { background: rgba(192, 192, 192, 0.15); color: #c0c0c0; }
.skill-priority.p3 { background: rgba(205, 127, 50, 0.15); color: #cd7f32; }
.skill-priority.p4, .skill-priority.p5, .skill-priority.p6 { background: var(--bg-glass); color: var(--text-secondary); }
.skill-info { flex: 1; }
.skill-name { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
.skill-meta { display: flex; gap: 8px; margin-bottom: 6px; }
.skill-tag { font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 500; }
.skill-tag.type { background: var(--gold-dim); color: var(--gold); }
.skill-tag.level { background: var(--crimson-dim); color: var(--crimson); }
.skill-desc { font-size: 12px; color: var(--text-secondary); line-height: 1.5; }
.equip-list { display: grid; gap: 8px; }
.equip-item {
  display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 16px;
  padding: 12px 16px; background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: var(--radius-sm);
}
.equip-stat { font-size: 14px; font-weight: 500; }
.equip-stars { font-size: 12px; letter-spacing: -1px; }
.equip-note { font-size: 12px; color: var(--text-secondary); text-align: right; }
.base-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px; }
.base-stat {
  text-align: center; padding: 12px; background: var(--bg-card);
  border-radius: var(--radius-sm); border: 1px solid var(--border-subtle);
}
.base-stat-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
.base-stat-value { font-family: var(--font-display); font-size: 20px; font-weight: 700; }
.training-timeline { position: relative; padding-left: 40px; }
.training-timeline::before {
  content: ''; position: absolute; left: 15px; top: 0; bottom: 0; width: 2px;
  background: linear-gradient(to bottom, var(--gold), var(--crimson), var(--gold)); opacity: 0.3;
}
.training-spot {
  position: relative; margin-bottom: 16px; padding: 20px 24px;
  background: var(--bg-card); border: 1px solid var(--border-subtle);
  border-radius: var(--radius-md); transition: var(--transition);
}
.training-spot:hover { border-color: var(--border-glow); background: var(--bg-card-hover); }
.training-spot.current { border-color: var(--gold); box-shadow: 0 0 20px rgba(212, 175, 55, 0.15); }
.training-spot::before {
  content: ''; position: absolute; left: -33px; top: 24px; width: 12px; height: 12px;
  border-radius: 50%; background: var(--bg-secondary); border: 2px solid var(--text-muted); transition: var(--transition);
}
.training-spot.current::before { background: var(--gold); border-color: var(--gold); box-shadow: 0 0 10px rgba(212, 175, 55, 0.5); }
.training-level { font-family: var(--font-display); font-size: 18px; font-weight: 700; color: var(--gold); margin-bottom: 4px; }
.training-maps { font-size: 14px; font-weight: 500; margin-bottom: 8px; }
.training-tactic {
  font-size: 13px; color: var(--text-secondary); margin-bottom: 12px; padding: 8px 12px;
  background: var(--bg-glass); border-radius: var(--radius-sm); border-left: 3px solid var(--gold);
}
.training-formation {
  font-size: 13px; margin-bottom: 8px; padding: 6px 12px;
  background: var(--crimson-dim); border-radius: var(--radius-sm); font-weight: 500;
}
.training-tips { list-style: none; display: grid; gap: 4px; }
.training-tips li { font-size: 12px; color: var(--text-secondary); padding-left: 16px; position: relative; }
.training-tips li::before { content: '→'; position: absolute; left: 0; color: var(--gold); }
.training-level-input {
  display: flex; align-items: center; gap: 16px; padding: 16px 24px;
  background: var(--bg-card); border: 1px solid var(--border-subtle);
  border-radius: var(--radius-md); margin-bottom: 32px;
}
.training-level-input label { font-size: 14px; font-weight: 500; color: var(--text-secondary); white-space: nowrap; }
.training-level-input input[type="number"] {
  width: 80px; padding: 8px 12px; border: 1px solid var(--border-subtle);
  border-radius: var(--radius-sm); background: var(--bg-secondary); color: var(--gold);
  font-family: var(--font-display); font-size: 20px; font-weight: 700; text-align: center; outline: none;
}
.training-level-input input:focus { border-color: var(--gold); box-shadow: 0 0 10px rgba(212, 175, 55, 0.2); }
.training-level-info { font-size: 13px; color: var(--text-secondary); }
@media (max-width: 768px) {
  #main-nav { padding: 0 16px; }
  #page-content { padding: 80px 16px 32px; }
  .page-title { font-size: 24px; }
  .team-grid { grid-template-columns: 1fr; }
  .detail-header { flex-direction: column; text-align: center; }
  .tabs { flex-wrap: wrap; }
  .calc-bar-row { grid-template-columns: 80px 1fr 50px; }
  .base-stats { grid-template-columns: repeat(2, 1fr); }
  .equip-item { grid-template-columns: 1fr; gap: 4px; }
  .equip-note { text-align: left; }
}
</style>
</head>

// ═══ CALCULATOR ═══
function calcStats(char, level) {
  const b = char.baseStats, g = char.buildGuide.calc;
  const total = 80 + (level - 1) * 5;
  let sm = level <= g.smReachAt ? Math.min(Math.round(b.sm + ((g.smTarget - b.sm) / g.smReachAt) * level), g.smTarget) : g.smTarget;
  let tp = b.tp;
  for (const r of g.tpRate) { const s = Math.max(r.f, 1), e = Math.min(r.t, level); if (e >= s) tp += (e - s + 1) * r.p; }
  let nl, sk;
  if (g.nlFixed === -1) {
    const skr = level <= 60 ? 1 : 0.5;
    sk = Math.round(b.sk + skr * (level - 1));
    nl = Math.max(total - sm - tp - sk, b.nl);
  } else {
    nl = b.nl + (g.nlFixed || 0);
    sk = Math.max(total - sm - tp - nl, b.sk);
  }
  return { sm, tp, sk, nl, total };
}

function getNote(char, level) {
  for (const p of char.buildGuide.phases) {
    const [a, z] = p.level.split('-').map(Number);
    if (level >= a && level <= z) return p.note;
  }
  return '';
}

      <div class="training-spot" data-min="${s.levelMin}" data-max="${s.levelMax}">
        <div class="training-level">Cấp ${s.levelRange}</div>
        <div class="training-maps">📍 ${s.maps.join(' · ')}</div>
        <div class="training-tactic">⚔️ ${s.partyTactic}</div>
        <div class="training-formation">🎯 ${s.formation}</div>
        <p style="font-size:13px;color:var(--text-secondary);margin-bottom:8px">${s.details}</p>
        <ul class="training-tips">${s.tips.map(t => `<li>${t}</li>`).join('')}</ul></div>`).join('')}</div>`;
}

// ═══ UI HELPERS ═══
function switchTab(tab, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-' + tab)?.classList.add('active');
}

function syncLevel(charId, val, source) {
  let level = Math.max(1, Math.min(100, parseInt(val) || 1));
  const slider = document.getElementById('level-slider');
  const number = document.getElementById('level-number');
  if (source === 'slider' && number) number.value = level;
  if (source === 'number' && slider) slider.value = level;
  updateCalc(charId, level);
}

function updateCalc(charId, level) {
  level = parseInt(level);
  const c = characters.find(x => x.id === charId);
  const s = calcStats(c, level);
  const mx = Math.max(s.sm, s.tp, s.sk, s.nl, 1);
  const colors = {sm:'var(--crimson)',tp:'var(--green)',sk:'var(--orange)',nl:'var(--blue)'};
  const labels = {sm:'Sức Mạnh',tp:'Thân Pháp',sk:'Sinh Khí',nl:'Nội Lực'};
  document.getElementById('calc-bars').innerHTML = Object.keys(labels).map(k =>
    `<div class="calc-bar-row"><span class="calc-bar-label">${labels[k]}</span>
      <div class="calc-bar-track"><div class="calc-bar-fill" style="width:${Math.max((s[k]/mx)*100,2)}%;background:${colors[k]}"></div></div>
      <span class="calc-bar-value" style="color:${colors[k]}">${s[k]}</span></div>`).join('');
  document.getElementById('calc-note').innerHTML = `<strong>Level ${level}</strong> — Tổng điểm: ${s.total} · ${getNote(c, level)}`;
}

function updateTraining() {
  const lv = Math.max(1, Math.min(100, parseInt(document.getElementById('training-level').value) || 1));
  document.querySelectorAll('.training-spot').forEach(el => {
    el.classList.toggle('current', lv >= parseInt(el.dataset.min) && lv <= parseInt(el.dataset.max));
  });
  const spot = trainingSpots.find(s => lv >= s.levelMin && lv <= s.levelMax);
  const info = document.getElementById('training-level-info');
  if (info && spot) info.textContent = '→ ' + spot.maps[0];
  localStorage.setItem('vltk_lv', lv);
}

// ═══ RENDER ═══
function render() {
  const el = document.getElementById('page-content');
  document.querySelectorAll('.nav-link').forEach(l => l.classList.toggle('active',
    l.dataset.page === currentPage || (currentPage === 'char' && l.dataset.page === 'team')));
  switch (currentPage) {
    case 'team': el.innerHTML = renderTeam(); break;
    case 'char': el.innerHTML = renderChar(currentParam); setTimeout(() => updateCalc(currentParam, 50), 10); break;
    case 'training': el.innerHTML = renderTraining(); setTimeout(updateTraining, 10); break;
    default: el.innerHTML = renderTeam();
  }
  window.scrollTo(0, 0);
}

render();
</script>
</body>
</html>
